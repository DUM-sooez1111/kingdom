<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102235" />
    <title>Crownvale — 왕국 건설</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="world" aria-label="Crownvale 3D 왕국"></canvas>
      <header class="topbar glass">
        <div class="brand"><span class="crown">♛</span><span>CROWNVALE</span><small>왕국 건설</small></div>
        <div class="resources">
          <div class="resource"><span>✦</span><strong id="cash">1,000</strong><small>골드</small></div>
          <div class="resource"><span>⌂</span><strong id="population">0</strong><small>주민</small></div>
          <div class="resource"><span>♛</span><strong id="rebirths">0</strong><small>환생</small></div>
          <button id="saveButton" class="icon-button" title="저장">▣</button>
        </div>
      </header>
      <aside class="left-column">
        <section class="mission-card glass">
          <div class="eyebrow">왕실 의뢰</div><h2 id="missionTitle">오두막 3채를 건설하세요</h2>
          <div class="progress-track"><i id="missionProgress"></i></div>
          <div class="mission-bottom"><span id="missionText">0 / 3</span><button id="claimMission" disabled>보상 수령</button></div>
        </section>
        <section class="hint-card glass"><b>카메라 조작</b><span>우클릭 드래그 이동 · <kbd>Q</kbd> <kbd>E</kbd> 회전 · 휠 확대/축소</span><span>건물 선택 후 빈 토지를 클릭해 건설</span></section>
      </aside>
      <aside class="right-column glass">
        <div class="panel-tabs" role="tablist"><button class="tab active" data-tab="build">건설</button><button class="tab" data-tab="land">영토</button><button class="tab" data-tab="workers">노동자</button></div>
        <div id="buildPanel" class="panel active"><p class="panel-note">건물을 선택한 뒤 소유한 토지를 클릭하세요.</p><div id="categoryList" class="category-list"></div><div id="buildingList" class="building-list"></div></div>
        <div id="landPanel" class="panel"><p class="panel-note">어두운 영토를 선택해 왕국을 확장하세요.</p><div id="landList" class="land-list"></div></div>
        <div id="workersPanel" class="panel"><div class="worker-art">♜</div><h3>세금 수집대</h3><p id="workerInfo">수집자 0명 · 매 10초 건물 0채를 수금합니다.</p><button id="hireWorker" class="primary">수집자 고용 <span>600 골드</span></button><button id="unlockAuto" class="secondary">왕실 자동 수금 <span>1,200 골드</span></button><button id="collectTax" class="collect">쌓인 세금 수금 <b id="storedTax">0</b></button></div>
      </aside>
      <section class="bottom-bar glass"><div class="selection"><span class="selection-label">선택</span><strong id="selectionName">건물을 선택하세요</strong><span id="selectionMeta">토지를 클릭해 배치</span></div><button id="rotateButton" class="secondary compact">↻ 회전</button><button id="deleteButton" class="danger compact">삭제</button><button id="rebirthButton" class="secondary compact">♛ 환생</button><button id="cancelButton" class="secondary compact">취소</button></section>
      <div id="toast" role="status"></div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
